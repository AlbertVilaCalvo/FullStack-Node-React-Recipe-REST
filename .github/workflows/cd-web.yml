name: CD Web

on:
  push:
    branches:
      - main
    paths:
      - web/**
      - .github/workflows/cd-web.yml
  workflow_dispatch:

# Do not cancel in-progress deployments.
concurrency:
  group: cd-web
  cancel-in-progress: false

defaults:
  run:
    working-directory: web

jobs:
  deploy_dev:
    name: Deploy to dev
    runs-on: ubuntu-24.04
    environment:
      name: dev
    permissions:
      id-token: write
      contents: read
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Build React web app
        run: npm run build
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_OIDC_ROLE_ARN_WEB }}
          role-session-name: 'GitHubActions-web-deploy-dev'
      - name: Upload build folder files to S3
        run: aws s3 sync build s3://${{ vars.WEB_S3_BUCKET }} --delete
      - name: Invalidate CloudFront distribution
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.WEB_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths '/*'

  # Deployment to production is protected by environment protection rules.
  # Must configure required reviewers at GitHub Settings → Environments → prod → Required reviewers.
  deploy_prod:
    name: Deploy to prod
    needs: deploy_dev
    runs-on: ubuntu-24.04
    environment:
      name: prod
    permissions:
      id-token: write
      contents: read
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Build React web app
        run: npm run build
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_OIDC_ROLE_ARN_WEB }}
          role-session-name: 'GitHubActions-web-deploy-prod'
      - name: Upload build folder files to S3
        run: aws s3 sync build s3://${{ vars.WEB_S3_BUCKET }} --delete
      - name: Invalidate CloudFront distribution
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.WEB_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths '/*'
