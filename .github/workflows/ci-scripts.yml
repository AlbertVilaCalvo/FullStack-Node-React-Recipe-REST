name: Scripts CI

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/ci-scripts.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/ci-scripts.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        run: find scripts -type f -name "*.sh" -exec shellcheck {} +

  shfmt:
    name: Shell Format Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up shfmt
        run: |
          curl -sSLo /usr/local/bin/shfmt https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64
          chmod +x /usr/local/bin/shfmt
      - name: Run shfmt check
        # -l: list files whose formatting differs from shfmt's
        # -d: diff (optional, failing if different)
        # Using the defined rules: -i 2 -ci -bn
        run: shfmt -d -i 2 -ci -bn scripts/
