name: CI - Scripts

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/**
      - pre-commit
      - .github/workflows/ci-scripts.yml
  push:
    branches:
      - main
    paths:
      - scripts/**
      - pre-commit
      - .github/workflows/ci-scripts.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shfmt:
    name: shfmt (formatting)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install shfmt
        uses: ./.github/actions/install-shfmt
      - name: Check shell script formatting
        # -l: list files that differ; exits 1 if any file is not formatted
        run: shfmt -l -i 2 -ci -bn scripts/ pre-commit

  shellcheck:
    name: ShellCheck (linting)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version
      - name: Run ShellCheck
        run: |
          find scripts -type f -name '*.sh' -exec shellcheck {} +
          shellcheck pre-commit
