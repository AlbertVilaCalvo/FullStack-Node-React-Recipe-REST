name: Global CI (Linting & Formatting)

on:
  push:
    branches: [main]
    paths:
      - '.github/**'
      - '*.json'
      - '*.md'
      - '*.yml'
      - '*.yaml'
  pull_request:
    branches: [main]
    paths:
      - '.github/**'
      - '*.json'
      - '*.md'
      - '*.yml'
      - '*.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prettier:
    name: Prettier Format Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run Prettier check
        run: npm run format:check

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run yamllint
        run: yamllint .
