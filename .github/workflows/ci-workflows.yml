name: CI - Workflows

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/actions/**
      - .github/workflows/ci-workflows.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint (workflow syntax)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        uses: ./.github/actions/install-actionlint
      - name: Run actionlint
        run: actionlint
