name: Server (Node.js REST API)

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - kubernetes/server/base/**
      - .github/workflows/server.yml
  pull_request:
    branches:
      - main
    paths:
      - server/**
      - kubernetes/server/base/**
      - .github/workflows/server.yml
    types:
      - opened
      - synchronize
      - closed
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: server

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run Typecheck
        run: npx tsc --noEmit

  tests:
    name: Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run tests
        run: npm test

  deploy_dev:
    name: Deploy to Dev
    needs: [eslint, typecheck, tests]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    environment:
      name: dev
    permissions:
      id-token: write
      contents: write # Needed to commit kustomization.yaml back to main
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN_SERVER }}
          role-session-name: 'GitHubActions-server-deploy-dev'

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Short SHA
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build, tag, and push Docker image to ECR
        env:
          ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
        run: |
          docker build --platform linux/amd64 -t recipe-manager-server:${{ env.SHORT_SHA }} .
          docker tag recipe-manager-server:${{ env.SHORT_SHA }} ${ECR_REPOSITORY_URL}:${{ env.SHORT_SHA }}
          docker push ${ECR_REPOSITORY_URL}:${{ env.SHORT_SHA }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.8.1'

      - name: Update Kubernetes manifests
        run: |
          cd ../kubernetes/server/overlays/dev
          kustomize edit set image recipe-manager-api-server=${{ vars.ECR_REPOSITORY_URL }}:${{ env.SHORT_SHA }}

      - name: Commit and push GitOps changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ../kubernetes/server/overlays/dev/kustomization.yaml
          git commit -m "chore(gitops): deploy server dev (${{ env.SHORT_SHA }}) [skip ci]"
          git push

  deploy_prod:
    name: Deploy to Prod
    needs: [deploy_dev]
    runs-on: ubuntu-24.04
    environment:
      name: prod
    permissions:
      id-token: write
      contents: write # Needed to commit kustomization.yaml back to main
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main # Check out the main branch again to get the latest commit produced by deploy_dev

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN_SERVER }}
          role-session-name: 'GitHubActions-server-deploy-prod'

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Short SHA
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build, tag, and push Docker image to ECR
        env:
          ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
        run: |
          docker build --platform linux/amd64 -t recipe-manager-server:${{ env.SHORT_SHA }} .
          docker tag recipe-manager-server:${{ env.SHORT_SHA }} ${ECR_REPOSITORY_URL}:${{ env.SHORT_SHA }}
          docker push ${ECR_REPOSITORY_URL}:${{ env.SHORT_SHA }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.8.1'

      - name: Update Kubernetes manifests
        run: |
          cd ../kubernetes/server/overlays/prod
          kustomize edit set image recipe-manager-api-server=${{ vars.ECR_REPOSITORY_URL }}:${{ env.SHORT_SHA }}

      - name: Commit and push GitOps changes
        run: |
          # Make sure to pull first in case there were other commits to main while waiting for approval
          git pull origin main
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ../kubernetes/server/overlays/prod/kustomization.yaml
          git commit -m "chore(gitops): deploy server prod (${{ env.SHORT_SHA }}) [skip ci]"
          git push
