name: CI Server (Node.js API)

on:
  pull_request:
    branches:
      - main
    paths:
      - server/**
      - .github/workflows/ci-server.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-server-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: server

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run TypeScript compiler check
        run: npx tsc --noEmit

  tests:
    name: Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Build server
        run: npm run build

  dockerfile_lint:
    name: Dockerfile lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: server/Dockerfile
      - name: Lint Dockerfile.local
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: server/Dockerfile.local

  trivy_fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy scan (CRITICAL only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'server'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
