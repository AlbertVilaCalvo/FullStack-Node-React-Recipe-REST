name: 'CI: Server'

on:
  pull_request:
    branches:
      - main
    paths:
      - server/**
      - .github/workflows/ci-server.yml
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: server

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run TypeScript compiler check
        run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: Install dependencies
        run: npm ci --no-fund --no-audit
      - name: Run tests
        run: npm test
