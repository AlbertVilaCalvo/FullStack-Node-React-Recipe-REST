name: Terraform CI

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/ci-terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/ci-terraform.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform_fmt:
    name: Terraform Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0' # Or whatever default version is good
      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

  terraform_validate:
    name: Terraform Validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
      - name: Validate Terraform configs
        # Finds all directories with .tf files and runs init & validate
        run: |
          for dir in $(find terraform -type f -name "*.tf" -exec dirname {} \; | sort -u); do
            echo "Validating $dir"
            cd "$dir"
            terraform init -backend=false
            terraform validate
            cd - > /dev/null
          done

  tflint:
    name: TFLint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: terraform-linters/setup-tflint@v4
      - name: Run TFLint
        run: |
          tflint --init
          tflint -f compact --recursive terraform/

  trivy_iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in IaC mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: false
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          target: 'terraform/'
