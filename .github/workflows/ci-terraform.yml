name: CI Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - terraform/**
      - .tflint.hcl
      - .github/workflows/ci-terraform.yml
    types:
      - opened
      - synchronize
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform/

  validate:
    name: Validate (${{ matrix.directory }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        directory:
          - terraform/bootstrap/environments/all
          - terraform/bootstrap/environments/dev
          - terraform/bootstrap/environments/prod
          - terraform/server/environments/dev
          - terraform/server/environments/prod
          - terraform/web/environments/dev
          - terraform/web/environments/prod
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false
      - name: Terraform validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

  tflint:
    name: TFLint (${{ matrix.directory }})
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        directory:
          - terraform/bootstrap/environments/all
          - terraform/bootstrap/environments/dev
          - terraform/bootstrap/environments/prod
          - terraform/server/environments/dev
          - terraform/server/environments/prod
          - terraform/web/environments/dev
          - terraform/web/environments/prod
    steps:
      - uses: actions/checkout@v6
      - uses: terraform-linters/setup-tflint@v4
      - name: Init TFLint
        working-directory: ${{ matrix.directory }}
        run: tflint --init --config "$GITHUB_WORKSPACE/.tflint.hcl"
      - name: Run TFLint
        working-directory: ${{ matrix.directory }}
        run: tflint --config "$GITHUB_WORKSPACE/.tflint.hcl"

  security:
    name: Security (Trivy)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: 'config'
          scan-ref: 'terraform/'
          severity: 'HIGH,CRITICAL'
