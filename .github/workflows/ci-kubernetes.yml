name: CI - Kubernetes

on:
  pull_request:
    branches:
      - main
    paths:
      - kubernetes/**
      - .github/workflows/ci-kubernetes.yml
  push:
    branches:
      - main
    paths:
      - kubernetes/**
      - .github/workflows/ci-kubernetes.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-24.04
    env:
      KUBERNETES_VERSION: '1.34' # Should match the value in terraform/server/environments/{env}/terraform.tfvars
    steps:
      - uses: actions/checkout@v6
      - name: Install Kustomize
        run: |
          KUSTOMIZE_VERSION=5.8.1
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kustomize
          kustomize version
      - name: Install Kubeconform
        run: |
          KUBECONFORM_VERSION=0.7.0
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v
      - name: Validate server manifests (dev)
        # -strict: fail on unknown fields in known schemas
        # -summary: print a summary line at the end
        # The CRDs-catalog is used as a secondary schema location to validate CRDs
        # such as ExternalSecret and SecretStore (from External Secrets Operator).
        run: |
          kustomize build kubernetes/server/overlays/dev \
            | kubeconform \
              -strict \
              -summary \
              -kubernetes-version "$KUBERNETES_VERSION" \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -
      - name: Validate server manifests (prod)
        run: |
          kustomize build kubernetes/server/overlays/prod \
            | kubeconform \
              -strict \
              -summary \
              -kubernetes-version "$KUBERNETES_VERSION" \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -
      - name: Validate CRD manifests (argocd-apps, karpenter-nodepool)
        run: |
          kubeconform \
            -strict \
            -summary \
            -kubernetes-version "$KUBERNETES_VERSION" \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            kubernetes/argocd-apps/ \
            kubernetes/karpenter-nodepool/

  # We do not run KubeLinter in folders that only contain CRDs (Application, NodePool, EC2NodeClass, etc.) since
  # it simply reports 'Warning: no valid objects found'.
  kube_linter:
    name: KubeLinter
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      # We need to render the manifests before linting, otherwise KubeLinter reports errors in incomplete manifests
      # (for example, 'object has no selector specified' in deployment_patch.yaml).
      - name: Install Kustomize
        run: |
          KUSTOMIZE_VERSION=5.8.1
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kustomize
          kustomize version
      - name: Install KubeLinter
        run: |
          KUBE_LINTER_VERSION=0.7.2
          curl -sSL "https://github.com/stackrox/kube-linter/releases/download/v${KUBE_LINTER_VERSION}/kube-linter-linux.tar.gz" \
            | tar -xz -C /usr/local/bin
          kube-linter version
      - name: Run KubeLinter - server (dev)
        continue-on-error: true
        run: kustomize build kubernetes/server/overlays/dev | kube-linter lint -
      - name: Run KubeLinter - server (prod)
        continue-on-error: true
        run: kustomize build kubernetes/server/overlays/prod | kube-linter lint -
