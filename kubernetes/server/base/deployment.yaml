apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-manager-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recipe-manager
  template:
    metadata:
      labels:
        app: recipe-manager
    spec:
      serviceAccountName: recipe-manager-api
      containers:
        - name: api
          # Value is set with `kustomize edit set image` in cd-server.yaml, which edits kustomization.yaml
          image: recipe-manager-api-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: recipe-manager-api-config
            - secretRef:
                name: recipe-manager-api-secrets
            - secretRef:
                name: recipe-manager-api-parameters
          # From https://x.com/thockin/status/1134193838841401345
          # Memory limit == Memory request, No CPU limit
          resources:
            requests:
              memory: '256Mi'
              cpu: '125m'
            limits:
              memory: '256Mi'
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 30
