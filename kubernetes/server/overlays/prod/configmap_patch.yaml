apiVersion: v1
kind: ConfigMap
metadata:
  name: recipe-manager-api-config
data:
  CORS_ORIGINS: 'https://recipeapp.link,https://www.recipeapp.link'
  DB_USER: 'postgres'
  DB_NAME: 'recipe_manager_prod'
  # DB_HOST is a Terraform output; injected at deploy time by deploy-server-eks.sh
  DB_HOST: DEPLOY_TIME_RDS_ADDRESS
