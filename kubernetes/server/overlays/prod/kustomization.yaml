apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: recipe-manager

resources:
  - ../../base
  - external-secret.yaml

# Labels for all resources
labels:
  - pairs:
      environment: prod

patches:
  - path: ingress_patch.yaml
  - path: configmap_patch.yaml
  - path: deployment_patch.yaml
