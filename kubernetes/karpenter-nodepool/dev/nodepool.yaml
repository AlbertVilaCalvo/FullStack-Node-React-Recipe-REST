apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ['amd64']
        - key: kubernetes.io/os
          operator: In
          values: ['linux']
        - key: karpenter.sh/capacity-type
          operator: In
          # If you use spot and on-demand, you need at least 5 instance types, otherwise you get:
          #   "failed while checking on-demand fallback: at least 5 instance types are recommended
          #   when flexible to spot but requesting on-demand, the current provisioning request only
          #   has 2 instance type options"
          # AWS recommends 10: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/spot-best-practices.html#be-instance-type-flexible
          values: ['on-demand', 'spot']
        - key: node.kubernetes.io/instance-type
          operator: In
          # Order does not matter: Karpenter automatically provisions the cheapest available instance
          values:
            - t3a.small
            - t3.small
            - t3a.medium
            - t3.medium
            - t3a.large
            - t3.large
  limits:
    cpu: 50
    memory: 50Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
