apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  role: recipe-manager-eks-node-role-dev
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: recipe-manager-eks-cluster-dev
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: recipe-manager-eks-cluster-dev
        kubernetes.io/cluster/recipe-manager-eks-cluster-dev: owned
