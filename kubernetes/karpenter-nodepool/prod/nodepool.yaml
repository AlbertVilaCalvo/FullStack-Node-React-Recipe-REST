apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: kubernetes.io/os
          operator: In
          values:
            - linux
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: node.kubernetes.io/instance-type
          operator: In
          # Order does not matter: Karpenter automatically provisions the cheapest available instance
          values:
            - t3a.small
            - t3.small
            - t3a.medium
            - t3.medium
            - t3a.large
            - t3.large
            - t3a.xlarge
            - t3.xlarge
  limits:
    cpu: '100'
    memory: 100Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    # Longer wait time means less frequent node consolidation, which reduces pod evictions and restarts
    consolidateAfter: 5m
