apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recipe-manager-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/AlbertVilaCalvo/FullStack-Node-React-Recipe-REST.git
    targetRevision: HEAD
    path: kubernetes/server/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: recipe-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
