apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    # Install External Secrets Operator (alongside Karpenter) before the recipe manager application,
    # so that the ESO CRDs (SecretStore, ExternalSecret) exist when the server app is deployed.
    argocd.argoproj.io/sync-wave: '-1'
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # https://github.com/external-secrets/external-secrets/tree/main/deploy/charts/external-secrets
    # https://artifacthub.io/packages/helm/external-secrets-operator/external-secrets
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.3.0
    helm:
      valuesObject:
        serviceAccount:
          create: true
          name: external-secrets
        # Allow scheduling on the bootstrap nodes of the managed node group.
        tolerations:
          - key: karpenter.sh/controller
            operator: Exists
            effect: NoSchedule
        webhook:
          tolerations:
            - key: karpenter.sh/controller
              operator: Exists
              effect: NoSchedule
        certController:
          tolerations:
            - key: karpenter.sh/controller
              operator: Exists
              effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
