apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: '2.0.1'
    helm:
      valuesObject:
        serviceAccount:
          create: true
          # Must match the service account name in the Pod Identity Association created by Terraform
          name: external-secrets
        # Allow scheduling on the bootstrap nodes of the managed node group.
        tolerations:
          - key: karpenter.sh/controller
            operator: Exists
            effect: NoSchedule
        webhook:
          tolerations:
            - key: karpenter.sh/controller
              operator: Exists
              effect: NoSchedule
        certController:
          tolerations:
            - key: karpenter.sh/controller
              operator: Exists
              effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
