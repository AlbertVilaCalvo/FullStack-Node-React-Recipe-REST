apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recipe-manager-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/AlbertVilaCalvo/RecipeManager.git
    targetRevision: main
    path: kubernetes/server/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: recipe-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
