apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recipe-manager-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/albert/RecipeManager.git'
    path: kubernetes/server/overlays/dev # We'll patch this per environment
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: server
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
