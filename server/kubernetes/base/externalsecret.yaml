# ExternalSecret instructs ESO to pull the four application secrets from AWS Secrets Manager
# and materialise them as a standard Kubernetes Secret named recipe-manager-api-secrets.
# The deployment's envFrom references that secret name (see deployment.yaml), so no changes
# to the Deployment are required.
# https://external-secrets.io/latest/provider/aws-secrets-manager/
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recipe-manager-api-secrets
  namespace: recipe-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: recipe-manager-secretstore
    kind: SecretStore
  target:
    name: recipe-manager-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: REPLACE_WITH_RDS_PASSWORD_SECRET_NAME
    - secretKey: JWT_SECRET
      remoteRef:
        key: REPLACE_WITH_JWT_SECRET_NAME
    - secretKey: EMAIL_USER
      remoteRef:
        key: REPLACE_WITH_EMAIL_USER_SECRET_NAME
    - secretKey: EMAIL_PASSWORD
      remoteRef:
        key: REPLACE_WITH_EMAIL_PASSWORD_SECRET_NAME
