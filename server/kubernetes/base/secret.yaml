# SecretStore tells the External Secrets Operator (ESO) where to find secrets and
# how to authenticate. Authentication uses EKS Pod Identity: the ESO controller pod
# carries the eso IAM role (see terraform/server/modules/external-secrets/iam.tf),
# so no static credentials are needed here.
# https://external-secrets.io/latest/provider/aws-secrets-manager/
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: recipe-manager-secretstore
  namespace: recipe-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: REPLACE_WITH_AWS_REGION
